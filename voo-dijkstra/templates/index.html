<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AeroPath - Rotas Inteligentes</title>
    <!-- Referência ao arquivo CSS externo -->
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
  </head>

  <body>
    <main class="page-shell">
      <section class="hero">
        <div class="navbar">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M21,16V14L13,9V3.5A1.5,1.5 0 0,0 11.5,2A1.5,1.5 0 0,0 10,3.5V9L2,14V16L10,13.5V19L8,20.5V22L11.5,21L15,22V20.5L13,19V13.5L21,16Z"
            />
          </svg>
          <h1>AeroPath</h1>
        </div>
        <h2>Descubra a melhor rota</h2>
        <p>
          Utilize nossa API de grafos para encontrar caminhos com menos conexões
          e os voos mais baratos disponíveis globalmente, de forma inteligente e
          rápida.
        </p>
      </section>

      <section class="search-container">
        <form class="search-grid" id="search-form">
          <div class="form-group">
            <label for="origem">De onde você vai partir? (IATA)</label>
            <input type="text" id="origem" placeholder="Ex: BSB (Brasília)" />
          </div>
          <div class="form-group">
            <label for="destino">Para onde você vai? (IATA)</label>
            <input type="text" id="destino" placeholder="Ex: GRU (Guarulhos)" />
          </div>
          <button type="submit">Pesquisar Rotas</button>
        </form>
        <p class="search-hint">
          Digite o código IATA e veja as opções por menor número de conexões,
          menor preço e voo direto.
        </p>
      </section>

      <section class="content-area">
        <div id="resultados" class="resultados"></div>
      </section>
    </main>

    <!-- Referência ao arquivo JavaScript externo -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  </body>
</html>
